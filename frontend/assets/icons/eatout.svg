<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#D9534F"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5E5C8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Book drop shadow -->
  <rect x="122" y="124" width="268" height="300" rx="20" fill="rgba(0,0,0,0.18)" transform="translate(8,10)"/>

  <!-- Book body -->
  <rect x="122" y="124" width="268" height="300" rx="20" fill="white"/>

  <!-- Spine (warm brown) -->
  <rect x="122" y="124" width="50" height="300" rx="20" fill="#8B3A2E"/>
  <rect x="152" y="124" width="20" height="300" fill="#8B3A2E"/>

  <!-- Spine highlight -->
  <rect x="130" y="136" width="11" height="276" rx="5.5" fill="rgba(255,255,255,0.22)"/>

  <!-- Entry rows (warm tones) -->
  <rect x="192" y="188" width="88" height="13" rx="6.5" fill="#F5D4B0"/>
  <rect x="292" y="188" width="68" height="13" rx="6.5" fill="#EAB78E"/>

  <rect x="192" y="224" width="104" height="13" rx="6.5" fill="#F5D4B0"/>
  <rect x="308" y="224" width="52" height="13" rx="6.5" fill="#EAB78E"/>

  <rect x="192" y="260" width="72" height="13" rx="6.5" fill="#F5D4B0"/>
  <rect x="276" y="260" width="84" height="13" rx="6.5" fill="#EAB78E"/>

  <rect x="192" y="296" width="96" height="13" rx="6.5" fill="#F5D4B0"/>
  <rect x="300" y="296" width="60" height="13" rx="6.5" fill="#EAB78E"/>

  <!-- Divider -->
  <rect x="188" y="332" width="172" height="2" rx="1" fill="#F0DCC0"/>

  <!-- Balance row (warm orange highlight) -->
  <rect x="188" y="350" width="162" height="36" rx="10" fill="#E67E22"/>
  <rect x="204" y="362" width="90" height="12" rx="6" fill="rgba(255,255,255,0.65)"/>
  <rect x="304" y="362" width="32" height="12" rx="6" fill="rgba(255,255,255,0.35)"/>

  <!-- Plate badge (overlaps top-right corner of book) -->
  <circle cx="346" cy="162" r="76" fill="rgba(0,0,0,0.14)" transform="translate(5,6)"/>
  <circle cx="346" cy="162" r="76" fill="url(#plate)"/>
  <circle cx="346" cy="162" r="62" fill="none" stroke="rgba(217,83,79,0.45)" stroke-width="5"/>

  <!-- Crossed fork and knife inside the plate badge -->
  <g transform="translate(346,162) rotate(-25)">
    <!-- Fork handle -->
    <rect x="-32" y="-46" width="8" height="92" rx="3" fill="#5C3317"/>
    <!-- Fork tines -->
    <rect x="-36" y="-50" width="3" height="20" rx="1.5" fill="#5C3317"/>
    <rect x="-31" y="-50" width="3" height="20" rx="1.5" fill="#5C3317"/>
    <rect x="-26" y="-50" width="3" height="20" rx="1.5" fill="#5C3317"/>
    <rect x="-21" y="-50" width="3" height="20" rx="1.5" fill="#5C3317"/>
  </g>
  <g transform="translate(346,162) rotate(25)">
    <!-- Knife handle -->
    <rect x="24" y="-12" width="8" height="58" rx="3" fill="#5C3317"/>
    <!-- Knife blade -->
    <path d="M22,-46 L34,-46 Q40,-32 40,-12 L22,-12 Z" fill="#A0764C"/>
  </g>
</svg>
