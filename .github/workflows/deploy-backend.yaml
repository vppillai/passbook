name: Deploy Backend to AWS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      # Only the per-instance stack template triggers a redeploy.
      # bootstrap.yaml is a manually-managed stack (it creates the CI role
      # itself), so pushing it must NOT kick off the full instance matrix.
      - 'infrastructure/template.yaml'
      - 'config/instances/**'
      - '.github/workflows/deploy-backend.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Serialize backend deploys: two pushes to main must not run
# `cloudformation deploy` against the same stack at the same time. Queue
# rather than cancel — cancelling mid-CloudFormation could strand a stack
# in UPDATE_IN_PROGRESS.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache: true
      - name: Test
        working-directory: backend
        # No env vars or AWS access needed: service tests run against an
        # in-memory fake repo and cmd/api tests only exercise bodyReader.
        # Router setup is lazy (setupRouter), so nothing reads TABLE_NAME /
        # ALLOWED_ORIGIN at test time. go.sum is committed, so `go mod
        # download` builds in the default -mod=readonly checksum-verified mode.
        run: |
          go mod download
          go test -v -race ./...
          go vet ./...
      - name: Check formatting
        working-directory: backend
        # Mirror the test.yaml PR gate: a gofmt-violating direct push to main
        # must fail here too, otherwise it would deploy while PRs are blocked.
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "gofmt needed on:"
            echo "$UNFORMATTED"
            exit 1
          fi

  discover:
    runs-on: ubuntu-latest
    outputs:
      instances: ${{ steps.list.outputs.instances }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: list
        run: |
          INSTANCES=$(ls config/instances/*.yaml | xargs -n1 basename | sed 's/\.yaml$//' | jq -R . | jq -sc .)
          echo "instances=$INSTANCES" >> $GITHUB_OUTPUT
          echo "Discovered instances: $INSTANCES"

  build:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    outputs:
      s3_key: ${{ steps.upload.outputs.s3_key }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache: true
      - name: Build Lambda
        working-directory: backend
        run: |
          go mod download
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -tags lambda.norpc -o bootstrap ./cmd/api
          zip function.zip bootstrap
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/passbook-github-actions
          aws-region: ${{ env.AWS_REGION }}
      - id: upload
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name passbook-bootstrap \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaDeploymentBucketName'].OutputValue" \
            --output text)
          S3_KEY="function-${{ github.sha }}.zip"
          aws s3 cp backend/function.zip "s3://$BUCKET/$S3_KEY"
          echo "s3_key=$S3_KEY" >> $GITHUB_OUTPUT
          # Note: bucket name is NOT emitted as an output because it contains the
          # AWS account ID, which GitHub Actions redacts as a secret. Downstream
          # jobs re-query it from CloudFormation outputs.

  deploy:
    needs: [build, discover]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        instance: ${{ fromJson(needs.discover.outputs.instances) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Read instance config
        id: config
        run: |
          CONFIG="config/instances/${{ matrix.instance }}.yaml"
          MONTHLY=$(yq '.monthly_amount' "$CONFIG")
          # NOTE: yq/jq's `//` substitutes the default when the value is
          # null OR FALSE — `false // true` evaluates to true, which made
          # an explicit `carry_over_balance: false` silently deploy as
          # true (shipped that way to prod for weeks). Read the raw value
          # and only default when the key is actually absent.
          ALLOW_OVERSPEND=$(yq -r '.allow_overspending' "$CONFIG")
          if [ "$ALLOW_OVERSPEND" = "null" ]; then ALLOW_OVERSPEND=false; fi
          CARRY_OVER=$(yq -r '.carry_over_balance' "$CONFIG")
          if [ "$CARRY_OVER" = "null" ]; then CARRY_OVER=true; fi
          echo "monthly_amount=$MONTHLY" >> $GITHUB_OUTPUT
          echo "allow_overspending=$ALLOW_OVERSPEND" >> $GITHUB_OUTPUT
          echo "carry_over_balance=$CARRY_OVER" >> $GITHUB_OUTPUT
          echo "Instance: ${{ matrix.instance }}, monthly_amount: $MONTHLY, allow_overspend: $ALLOW_OVERSPEND, carry_over: $CARRY_OVER"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/passbook-github-actions
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy CloudFormation
        env:
          INSTANCE: ${{ matrix.instance }}
          S3_KEY: ${{ needs.build.outputs.s3_key }}
          MONTHLY: ${{ steps.config.outputs.monthly_amount }}
          ALLOW_OVERSPEND: ${{ steps.config.outputs.allow_overspending }}
          CARRY_OVER: ${{ steps.config.outputs.carry_over_balance }}
        run: |
          # Resolve bucket via shell var (not step output — output would be
          # redacted because the bucket name contains the AWS_ACCOUNT_ID secret)
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name passbook-bootstrap \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaDeploymentBucketName'].OutputValue" \
            --output text)
          # Derive the GitHub Pages origin from the repo owner so forks work
          # without editing this file. github.repository_owner is the user/org
          # that owns the repo (e.g. "vppillai" -> https://vppillai.github.io).
          ALLOWED_ORIGIN="https://${{ github.repository_owner }}.github.io"
          aws cloudformation deploy \
            --template-file infrastructure/template.yaml \
            --stack-name "passbook-${INSTANCE}-prod" \
            --parameter-overrides \
              Environment=prod \
              InstanceName="$INSTANCE" \
              LambdaCodeBucket="$BUCKET" \
              LambdaCodeKey="$S3_KEY" \
              AllowedOrigin="$ALLOWED_ORIGIN" \
              MonthlyAllowance="$MONTHLY" \
              AllowOverspending="$ALLOW_OVERSPEND" \
              CarryOverBalance="$CARRY_OVER" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
      # Note: previously this step ran `aws lambda update-function-code`
      # AFTER `cloudformation deploy`. That created a drift surface — the
      # CFN stack thinks Lambda points at one S3 key, but the live
      # function code has been swapped to another. Stack rollbacks and
      # change-set previews become untrustworthy. Now CFN is the single
      # source of truth: `LambdaCodeKey=${S3_KEY}` is already supplied to
      # the deploy command above, and the function is updated by CFN
      # itself. The direct API call has been removed.
      - name: Summarize
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name passbook-${{ matrix.instance }}-prod \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" --output text)
          echo "## Deployed: ${{ matrix.instance }}" >> $GITHUB_STEP_SUMMARY
          echo "- Stack: passbook-${{ matrix.instance }}-prod" >> $GITHUB_STEP_SUMMARY
          echo "- API: $API_URL" >> $GITHUB_STEP_SUMMARY

  # Zips are reproducible from git, so superseded artifacts are pure cost.
  # Keep only the newest 2: the current deploy plus the previous one, which
  # CloudFormation needs if a failed stack update auto-rolls-back (a missing
  # previous key strands the stack in UPDATE_ROLLBACK_FAILED). Runs only
  # when every instance deployed successfully, so a failed matrix leg keeps
  # its rollback artifact. Deletes create delete markers; the bucket's
  # 1-day NoncurrentVersionExpiration rule erases the bytes permanently.
  prune-artifacts:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/passbook-github-actions
          aws-region: ${{ env.AWS_REGION }}
      - name: Delete superseded Lambda zips
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name passbook-bootstrap \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaDeploymentBucketName'].OutputValue" \
            --output text)
          aws s3api list-objects-v2 --bucket "$BUCKET" --prefix function- \
            --query 'reverse(sort_by(Contents || `[]`, &LastModified))[2:].Key' \
            --output text | tr '\t' '\n' | while read -r KEY; do
            if [ -n "$KEY" ] && [ "$KEY" != "None" ]; then
              echo "Deleting superseded artifact: $KEY"
              aws s3api delete-object --bucket "$BUCKET" --key "$KEY" > /dev/null
            fi
          done
