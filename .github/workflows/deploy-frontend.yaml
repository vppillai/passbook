name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'config/instances/**'
      - '.github/workflows/deploy-frontend.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  AWS_REGION: us-west-2

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      instances: ${{ steps.list.outputs.instances }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: list
        run: |
          INSTANCES=$(ls config/instances/*.yaml | xargs -n1 basename | sed 's/\.yaml$//' | jq -R . | jq -sc .)
          echo "instances=$INSTANCES" >> $GITHUB_OUTPUT
          echo "Discovered instances: $INSTANCES"

  # Build runs under `environment: production` so it can assume the OIDC role
  # (the bootstrap stack trusts repo:vppillai/passbook:environment:production only).
  # AWS access is read-only here: we just query CloudFormation outputs to fetch
  # each instance's API endpoint and bake it into the static frontend bundle.
  build:
    needs: discover
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/passbook-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine version
        id: version
        run: |
          # Prefer the latest git tag reachable from this commit. This way
          # `git tag vX.Y.Z && git push --tags` is enough to update the
          # footer — no separate VERSION-file bump required. The file
          # only gets used as a fallback when there's no tag yet (e.g.
          # very early in a repo's history).
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$VERSION" ] && [ -f frontend/VERSION ]; then
            VERSION=$(cat frontend/VERSION | tr -d '[:space:]')
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Assemble multi-instance build
        env:
          INSTANCES: ${{ needs.discover.outputs.instances }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p build

          # Landing page (root): meta-refresh to preferred instance, with visible links as fallback
          # Determine default-redirect target (prefer 'kids' if present, else first in list)
          DEFAULT_TARGET=$(echo "$INSTANCES" | jq -r 'if any(. == "kids") then "kids" else .[0] end')

          {
            printf '%s\n' '<!doctype html>' '<html lang="en">' '<head>' '  <meta charset="utf-8">'
            printf '  <meta http-equiv="refresh" content="0; url=./%s/">\n' "$DEFAULT_TARGET"
            printf '%s\n' '  <title>Passbook</title>' \
              '  <style>body{font-family:system-ui,sans-serif;max-width:36em;margin:4em auto;padding:0 1em;color:#333}a{color:#4A90A4}</style>' \
              '</head>' '<body>' '  <h1>Passbook</h1>'
            printf '  <p>Redirecting to <a href="./%s/">%s</a>...</p>\n' "$DEFAULT_TARGET" "$(yq ".display_name" "config/instances/$DEFAULT_TARGET.yaml")"
            echo "  <ul>"
            for INSTANCE in $(echo "$INSTANCES" | jq -r '.[]'); do
              DISPLAY=$(yq '.display_name' "config/instances/$INSTANCE.yaml")
              printf '    <li><a href="./%s/">%s</a></li>\n' "$INSTANCE" "$DISPLAY"
            done
            echo "  </ul>"
            printf '  <script>location.replace(%s);</script>\n' "$(printf './%s/' "$DEFAULT_TARGET" | jq -Rs .)"
            printf '%s\n' '</body>' '</html>'
          } > build/index.html

          for INSTANCE in $(echo "$INSTANCES" | jq -r '.[]'); do
            echo "=== Building $INSTANCE ==="
            mkdir -p "build/$INSTANCE"
            cp -r frontend/. "build/$INSTANCE/"

            # Inject version into footer
            sed -i "s|>dev</span>|>$VERSION</span>|" "build/$INSTANCE/index.html"

            # Fetch API URL from CloudFormation outputs
            API_URL=$(aws cloudformation describe-stacks \
              --stack-name "passbook-$INSTANCE-prod" \
              --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
              --output text 2>/dev/null || echo "")
            if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
              echo "::warning::No API URL for $INSTANCE (stack may not be deployed yet)"
              API_URL=""
            else
              echo "API URL for $INSTANCE: $API_URL"
            fi

            # Extract labels from YAML as JSON (default to {} if missing)
            CONFIG_FILE="config/instances/$INSTANCE.yaml"
            LABELS_JSON=$(yq -o=json '.labels // {}' "$CONFIG_FILE")

            # Generate config.js: use jq to safely JSON-encode the API URL string
            {
              printf 'window.PASSBOOK_API_URL = %s;\n' "$(printf '%s' "$API_URL" | jq -Rs .)"
              printf 'window.PASSBOOK_LABELS = %s;\n' "$LABELS_JSON"
            } > "build/$INSTANCE/js/config.js"

            # Insert config.js script tag before app.js (must execute first)
            sed -i 's|<script type="module" src="js/app.js"></script>|<script src="js/config.js"></script>\n    <script type="module" src="js/app.js"></script>|' "build/$INSTANCE/index.html"

            # ===== PWA: per-instance manifest.json =====
            # Read pwa block from YAML and emit a complete manifest.json keyed for this instance.
            PWA_NAME=$(yq '.pwa.name // .display_name' "$CONFIG_FILE")
            PWA_SHORT=$(yq '.pwa.short_name // .display_name' "$CONFIG_FILE")
            PWA_DESC=$(yq '.pwa.description // ""' "$CONFIG_FILE")
            PWA_THEME=$(yq '.pwa.theme_color // "#4A90A4"' "$CONFIG_FILE")
            PWA_BG=$(yq '.pwa.background_color // "#f5f7fa"' "$CONFIG_FILE")
            START_URL="/passbook/$INSTANCE/"

            jq -n \
              --arg name "$PWA_NAME" \
              --arg short_name "$PWA_SHORT" \
              --arg description "$PWA_DESC" \
              --arg start_url "$START_URL" \
              --arg theme_color "$PWA_THEME" \
              --arg background_color "$PWA_BG" \
              '{
                name: $name,
                short_name: $short_name,
                description: $description,
                start_url: $start_url,
                display: "standalone",
                background_color: $background_color,
                theme_color: $theme_color,
                icons: [
                  { src: "assets/icon.svg", sizes: "any", type: "image/svg+xml" }
                ]
              }' > "build/$INSTANCE/manifest.json"

            # ===== PWA: update theme-color meta tag in index.html =====
            sed -i "s|<meta name=\"theme-color\" content=\"[^\"]*\">|<meta name=\"theme-color\" content=\"$PWA_THEME\">|" "build/$INSTANCE/index.html"

            # ===== Update meta description per-instance =====
            DESC=$(yq '.labels.app_description // ""' "$CONFIG_FILE")
            if [ -n "$DESC" ] && [ "$DESC" != "null" ]; then
              # jq for safe quoting; sed for the actual replacement
              ESCAPED_DESC=$(printf '%s' "$DESC" | sed -e 's/[&|]/\\&/g')
              sed -i "s|<meta name=\"description\" content=\"[^\"]*\">|<meta name=\"description\" content=\"$ESCAPED_DESC\">|" "build/$INSTANCE/index.html"
            fi

            # ===== Per-instance color theme =====
            # Read color tokens from YAML (falls back to pwa.theme_color/background_color).
            # Written to an external CSS file (NOT inline <style>) because the app's CSP
            # meta tag has style-src 'self', which blocks inline styles. An external
            # stylesheet from the same origin is permitted.
            COLOR_PRIMARY=$(yq '.colors.primary // .pwa.theme_color // "#4A90A4"' "$CONFIG_FILE")
            COLOR_PRIMARY_DARK=$(yq '.colors.primary_dark // ""' "$CONFIG_FILE")
            COLOR_BACKGROUND=$(yq '.colors.background // .pwa.background_color // "#f5f7fa"' "$CONFIG_FILE")
            # Negative-balance color is only meaningful when the instance can
            # actually produce negative balances — i.e., allow_overspending=true.
            # For hard-stop instances (allow_overspending=false), we don't emit
            # the override at all; the styles.css default (#f44336) stays as a
            # defensive fallback but never renders because the .balance-negative
            # class never toggles in practice.
            # Raw read + explicit null check: yq's `//` would also replace
            # an explicit `false` (see the note in deploy-backend.yaml).
            ALLOW_OVER_BAL=$(yq -r '.allow_overspending' "$CONFIG_FILE")
            if [ "$ALLOW_OVER_BAL" = "null" ]; then ALLOW_OVER_BAL=false; fi
            COLOR_NEGATIVE_OVERRIDE=$(yq '.colors.negative // ""' "$CONFIG_FILE")
            DEFAULT_NEGATIVE_COLOR="#991B1B"
            {
              echo ":root {"
              echo "    --primary-color: ${COLOR_PRIMARY};"
              if [ -n "$COLOR_PRIMARY_DARK" ] && [ "$COLOR_PRIMARY_DARK" != "null" ]; then
                echo "    --primary-dark: ${COLOR_PRIMARY_DARK};"
              fi
              echo "    --background: ${COLOR_BACKGROUND};"
              if [ "$ALLOW_OVER_BAL" = "true" ]; then
                if [ -n "$COLOR_NEGATIVE_OVERRIDE" ] && [ "$COLOR_NEGATIVE_OVERRIDE" != "null" ]; then
                  echo "    --negative-color: ${COLOR_NEGATIVE_OVERRIDE};"
                else
                  echo "    --negative-color: ${DEFAULT_NEGATIVE_COLOR};"
                fi
              fi
              echo "}"
            } > "build/$INSTANCE/css/theme.css"
            # Insert a <link> to theme.css AFTER the main stylesheet link, so cascade
            # source order makes the theme variables win.
            sed -i 's|<link rel="stylesheet" href="css/styles.css">|<link rel="stylesheet" href="css/styles.css">\n    <link rel="stylesheet" href="css/theme.css">|' "build/$INSTANCE/index.html"

            # ===== PWA: per-instance icon (overrides default if a custom one exists) =====
            if [ -f "frontend/assets/icons/$INSTANCE.svg" ]; then
              echo "Using per-instance icon: frontend/assets/icons/$INSTANCE.svg"
              cp "frontend/assets/icons/$INSTANCE.svg" "build/$INSTANCE/assets/icon.svg"
            else
              echo "Using default icon for $INSTANCE (frontend/assets/icon.svg)"
            fi

            echo "Built $INSTANCE: API=$API_URL, theme=$PWA_THEME"
          done

          # Strip the per-instance icons source dir from each subdir (it's a build-only input,
          # not something we want exposed in the deployed site). The default icon.svg has
          # already been overwritten where needed.
          for INSTANCE in $(echo "$INSTANCES" | jq -r '.[]'); do
            rm -rf "build/$INSTANCE/assets/icons"
          done

          echo ""
          echo "Build tree:"
          find build -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'build'

  # Deploy runs under `environment: github-pages` (required for actions/deploy-pages
  # to associate the deployment with the GitHub Pages environment). This job has no
  # AWS access and only consumes the build artifact uploaded by the previous job.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
