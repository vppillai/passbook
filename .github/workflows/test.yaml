name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache: false

      - name: Download dependencies
        working-directory: backend
        # go.sum is committed, so this builds in the default -mod=readonly
        # mode and verifies module checksums. `go mod tidy` belongs on a
        # dev machine, not in CI (it can silently rewrite go.mod/go.sum).
        run: go mod download

      - name: Run tests
        working-directory: backend
        # No env vars or AWS access needed: service tests run against an
        # in-memory fake repo and cmd/api tests only exercise bodyReader.
        # Router setup is lazy (setupRouter), so nothing reads TABLE_NAME /
        # ALLOWED_ORIGIN at test time.
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Run vet
        working-directory: backend
        run: go vet ./...

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check HTML syntax
        run: |
          # Basic HTML validation
          for file in frontend/*.html; do
            if grep -q "<html" "$file"; then
              echo "Checking $file..."
              # Check for unclosed tags (basic check)
              if ! grep -q "</html>" "$file"; then
                echo "Error: Missing </html> in $file"
                exit 1
              fi
            fi
          done
          echo "HTML check passed"

      - name: Check JavaScript syntax
        run: |
          # Install Node for basic JS validation
          for file in frontend/js/*.js; do
            echo "Checking $file..."
            node --check "$file" || exit 1
          done
          echo "JavaScript syntax check passed"
