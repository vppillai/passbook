name: Sync Backend API Configuration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (production, staging, development)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      region:
        description: 'AWS Region'
        required: true
        default: 'us-west-2'
      force_rebuild:
        description: 'Force frontend rebuild after sync'
        required: false
        default: false
        type: boolean
  schedule:
    # Run daily at 2 AM UTC to catch any manual backend changes
    - cron: '0 2 * * *'

permissions:
  contents: write
  id-token: write

jobs:
  sync-backend-config:
    name: Sync Backend Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ github.event.inputs.region || 'us-west-2' }}
          role-session-name: GitHubActions-SyncBackendConfig

      - name: Get CloudFormation stack outputs
        id: stack-outputs
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          REGION: ${{ github.event.inputs.region || 'us-west-2' }}
        run: |
          STACK_NAME="allowance-passbook-${ENVIRONMENT}"
          
          echo "📋 Fetching CloudFormation stack outputs..."
          echo "   Stack: ${STACK_NAME}"
          echo "   Region: ${REGION}"
          
          # Get all stack outputs as JSON
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${REGION}" \
            --query 'Stacks[0].Outputs' \
            --output json)
          
          # Extract specific values
          API_BASE_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="ApiGatewayBaseUrl") | .OutputValue')
          EMAIL_API_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="EmailServiceEndpoint") | .OutputValue')
          AUTH_LOGIN_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="AuthLoginEndpoint") | .OutputValue')
          AUTH_VALIDATE_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="AuthValidateEndpoint") | .OutputValue')
          
          # Set outputs for next steps
          echo "API_BASE_URL=${API_BASE_URL}" >> $GITHUB_OUTPUT
          echo "EMAIL_API_URL=${EMAIL_API_URL}" >> $GITHUB_OUTPUT
          echo "AUTH_LOGIN_URL=${AUTH_LOGIN_URL}" >> $GITHUB_OUTPUT
          echo "AUTH_VALIDATE_URL=${AUTH_VALIDATE_URL}" >> $GITHUB_OUTPUT
          
          echo "✅ Retrieved stack outputs:"
          echo "   API Base: ${API_BASE_URL}"
          echo "   Email: ${EMAIL_API_URL}"
          echo "   Auth Login: ${AUTH_LOGIN_URL}"
          echo "   Auth Validate: ${AUTH_VALIDATE_URL}"

      - name: Update frontend environment configuration
        env:
          API_BASE_URL: ${{ steps.stack-outputs.outputs.API_BASE_URL }}
          EMAIL_API_URL: ${{ steps.stack-outputs.outputs.EMAIL_API_URL }}
          AUTH_LOGIN_URL: ${{ steps.stack-outputs.outputs.AUTH_LOGIN_URL }}
          AUTH_VALIDATE_URL: ${{ steps.stack-outputs.outputs.AUTH_VALIDATE_URL }}
        run: |
          cd frontend
          
          # Extract base URL from endpoints
          AUTH_API_URL=$(echo "${AUTH_LOGIN_URL}" | sed 's|/auth/login$|/auth|')
          
          echo "📝 Updating .env.production..."
          cat > .env.production << EOF
          # Production environment variables for Allowance Passbook
          # Auto-generated from CloudFormation stack outputs
          # Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # Email service API endpoint (AWS API Gateway)
          VITE_EMAIL_API_URL=${EMAIL_API_URL}
          
          # Auth service API endpoint (AWS API Gateway)
          VITE_AUTH_API_URL=${AUTH_API_URL}
          
          # Alternative: Use base URL for all services
          VITE_API_URL=${API_BASE_URL}
          EOF
          
          echo "✅ Updated .env.production:"
          cat .env.production

      - name: Check for changes
        id: check-changes
        run: |
          git diff --quiet frontend/.env.production && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add frontend/.env.production
          git commit -m "chore: sync backend API configuration from CloudFormation stack [skip ci]"
          git push

      - name: Summary
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          echo "✅ Frontend configuration updated!"
          echo "   The frontend will be rebuilt automatically on the next push to main"
          echo "   Or trigger the deploy workflow manually from GitHub Actions"

