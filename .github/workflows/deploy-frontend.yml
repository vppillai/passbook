name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web-dashboard/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git describe

      - name: Inject version into app.js
        run: |
          VERSION=$(git describe --tags --always --long | sed 's/-dirty$//')
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" web-dashboard/app.js
          echo "Version: $VERSION"

      - name: Deploy web dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-dashboard
          publish_branch: gh-pages
          cname: false
          force_orphan: false
