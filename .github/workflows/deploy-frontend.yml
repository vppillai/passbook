name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build for web
        run: |
          npx expo export --platform web --output-dir dist
          # Create index.html if it doesn't exist
          if [ ! -f "dist/index.html" ]; then
            BUNDLE_NAME=$(ls dist/bundles/*.js | head -1 | xargs basename)
            cat > dist/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Passbook - Family Allowance Manager</title>
              <link rel="icon" href="./favicon.ico">
              <style>
                  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
                  #root { height: 100vh; width: 100vw; }
              </style>
          </head>
          <body>
              <div id="root"></div>
              <script src="./bundles/${BUNDLE_NAME}"></script>
          </body>
          </html>
          EOF
          fi
        env:
          EXPO_PUBLIC_API_URL: https://afbtrc48hc.execute-api.us-west-2.amazonaws.com/development
          NODE_ENV: production
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: false

